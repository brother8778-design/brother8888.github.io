<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <!-- deploy-version: 2026-07-04-force-pages-refresh -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FITNESS SCHEDULE - 健身房排班系統</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: rgba(255,255,255,.96);
      --line: #b9c6d6;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #4f46e5;
      --danger: #dc2626;
      --warn-bg: #fffbeb;
      --warn: #92400e;
    }
    * { box-sizing: border-box; }
    html { height: 100%; }
    body { margin: 0; min-height: 100vh; min-height: 100dvh; background: linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; }
    button, input, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app { min-height: 100vh; padding: 12px; }
    .login { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .login-card { width: min(390px, 100%); background: var(--panel); border: 1px solid white; border-radius: 24px; padding: 32px; box-shadow: 0 22px 55px rgba(15,23,42,.16); }
    h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: .02em; }
    .subtitle { margin: 4px 0 26px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .mobile-badge { display: none; }
    .login-card input { width: 100%; border: 1px solid var(--line); border-radius: 14px; background: #f8fafc; padding: 14px; text-align: center; font-size: 18px; font-weight: 800; letter-spacing: .2em; outline: none; }
    .login-card input:focus { background: white; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.16); }
    .primary { background: var(--brand); color: white; border-radius: 12px; padding: 10px 14px; font-weight: 900; box-shadow: 0 8px 18px rgba(79,70,229,.18); }
    .secondary { background: white; color: #334155; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-weight: 800; box-shadow: 0 1px 2px rgba(15,23,42,.04); }
    .secondary.active { background: #4f46e5; border-color: #4f46e5; color: white; }
    .danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; padding: 8px 10px; font-weight: 800; }
    .hint { margin-top: 18px; border: 1px solid #eef2f7; border-radius: 14px; background: #f8fafc; padding: 12px; color: var(--muted); text-align: center; font-size: 12px; font-weight: 800; line-height: 1.8; }
    .error { min-height: 20px; margin: 8px 0 12px; color: var(--danger); text-align: center; font-size: 12px; font-weight: 900; }
    .shell { height: calc(100vh - 24px); height: calc(100dvh - 24px); display: flex; flex-direction: column; gap: 12px; }
    header, nav, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 8px 24px rgba(15,23,42,.06); }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 18px; }
    .mode { border: 1px solid var(--line); border-radius: 10px; background: #f8fafc; padding: 7px 10px; color: #475569; font-size: 12px; font-weight: 900; }
    .header-actions, .toolbar, .tabs, .quickbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    nav { display: flex; justify-content: space-between; gap: 10px; padding: 8px; }
    .tabs { background: #e2e8f0; border-radius: 14px; padding: 4px; }
    .tab { border-radius: 10px; padding: 8px 13px; color: #64748b; font-size: 13px; font-weight: 900; background: transparent; }
    .tab.active { background: white; color: #0f172a; box-shadow: 0 2px 8px rgba(15,23,42,.08); }
    .notice { border: 1px solid #c7d2fe; background: #eef2ff; color: #3730a3; border-radius: 14px; padding: 10px 14px; font-size: 13px; font-weight: 850; }
    main { flex: 1; min-height: 0; }
    .panel { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #eef2f7; background: #f8fafc; }
    .range-title { min-width: 230px; text-align: center; font-size: 14px; font-weight: 950; }
    .mobile-controls-toggle { display: flex; width: calc(100% - 20px); margin: 10px; justify-content: space-between; align-items: center; }
    .mobile-week-switch { display: none; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; padding: 0 10px 10px; }
    .mobile-week-switch span { text-align: center; color: #475569; font-size: 12px; font-weight: 950; }
    .mobile-top-toggle { display: inline-flex; width: fit-content; }
    .top-collapsed header, .top-collapsed nav, .top-collapsed > .notice { display: none; }
    .cloud-pill { border: 1px solid #bfdbfe; border-radius: 999px; background: #eff6ff; color: #1d4ed8; padding: 6px 10px; font-size: 12px; font-weight: 950; }
    .weekly-controls { display: contents; }
    .weekly-controls.collapsed { display: none; }
    .quickbar { border-bottom: 1px solid #c7d2fe; background: #eef2ff; padding: 8px 12px; overflow-x: auto; }
    .quickbar span { color: #3730a3; font-size: 12px; font-weight: 950; white-space: nowrap; }
    .chip { border: 1px solid var(--line); border-radius: 10px; background: white; color: #475569; padding: 7px 10px; font-size: 12px; font-weight: 900; white-space: nowrap; }
    .chip.active { outline: 2px solid var(--brand); outline-offset: 1px; }
    .people-filter { display: flex; gap: 7px; align-items: center; overflow-x: auto; border-bottom: 1px solid #dbeafe; background: #f8fafc; padding: 8px 12px; -webkit-overflow-scrolling: touch; }
    .people-filter span { color: #475569; font-size: 12px; font-weight: 950; white-space: nowrap; }
    .person-chip { border: 1px solid #cbd5e1; border-radius: 999px; background: white; color: #334155; padding: 7px 10px; font-size: 12px; font-weight: 900; white-space: nowrap; }
    .person-chip.active { background: #4f46e5; border-color: #4f46e5; color: white; }
    .alerts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; padding-top: 8px; color: var(--warn); font-size: 12px; font-weight: 900; }
    .alerts-panel { border-bottom: 1px solid #fde68a; background: var(--warn-bg); padding: 8px 12px; color: var(--warn); }
    .alerts-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #f59e0b; border-radius: 12px; background: #fff7ed; color: var(--warn); padding: 9px 11px; font-size: 12px; font-weight: 950; text-align: left; box-shadow: 0 2px 8px rgba(146,64,14,.08); }
    .alerts-preview { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .alerts-action { border-radius: 999px; background: #f97316; color: white; padding: 4px 9px; white-space: nowrap; }
    .table-wrap { flex: 1; overflow: auto; overscroll-behavior: contain; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #94a3b8; }
    th, td { border: 1px solid #94a3b8; }
    th { position: sticky; top: 0; z-index: 2; background: #f8fafc; padding: 6px 4px; font-size: 11px; box-shadow: inset 0 -1px 0 #64748b; }
    .name-col { position: sticky; left: 0; z-index: 3; width: 132px; background: white; text-align: left; padding: 8px; box-shadow: inset -1px 0 0 #64748b; }
    thead .name-col { background: #f8fafc; z-index: 4; }
    .date-col { width: 46px; text-align: center; }
    .signature-col { width: 96px; text-align: center; box-shadow: inset 1px 0 0 #64748b; }
    tbody td { height: 40px; background: white; padding: 3px; }
    tbody tr:hover td, tbody tr:hover .name-col { background: #f8fafc; }
    .employee-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 950; }
    .employee-name span { display: inline; }
    .role { color: #94a3b8; font-size: 10px; font-weight: 850; }
    .date { color: #64748b; font-size: 10px; font-weight: 950; }
    .dow { font-size: 12px; font-weight: 950; }
    .copy-date { cursor: pointer; }
    .copy-source { outline: 2px solid #4f46e5; outline-offset: -2px; }
    .holiday { margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-radius: 4px; background: #ef4444; color: white; padding: 1px 2px; font-size: 8px; font-weight: 900; }
    .meeting-label { background: #60a5fa !important; color: #0f172a; }
    .monday { background: #dbeafe !important; }
    .weekend { background: #fef3c7 !important; }
    .holiday-cell { background: #fee2e2 !important; }
    tr.group-start td, tr.group-start .name-col { border-top: 5px solid #111827 !important; }
    tr.group-coach .name-col { background: #f8fafc; }
    tr.group-frontdesk .name-col { background: #fff7ed; }
    tr.group-parttime .name-col { background: #f8fafc; }
    .signature-line { height: 18px; border-bottom: 1px dashed #64748b; }
    .cell { cursor: pointer; }
    .shift { width: 100%; height: 100%; display: grid; place-items: center; border-radius: 7px; border: 1px solid; font-size: 12px; font-weight: 950; }
    .M { background: transparent; color: #2563eb; border-color: transparent; }
    .A, .N, .P, .CUSTOM { background: transparent; color: #111827; border-color: transparent; }
    .O { background: transparent !important; color: #dc2626; border-color: transparent !important; box-shadow: none !important; }
    .AL { background: #fef08a !important; color: #dc2626; border-color: #facc15 !important; box-shadow: none !important; }
    .CUSTOM { background: transparent; color: #111827; border-color: transparent; }
    .picker { position: fixed; inset: 0; display: none; place-items: center; background: rgba(15,23,42,.16); z-index: 10; padding: 20px; }
    .picker.open { display: grid; }
    .picker-card { width: min(360px, 100%); background: white; border: 1px solid var(--line); border-radius: 16px; padding: 14px; box-shadow: 0 20px 40px rgba(15,23,42,.18); }
    .picker-title { padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 10px; text-align: center; color: #64748b; font-size: 12px; font-weight: 950; }
    .picker-grid { display: grid; grid-template-columns: repeat(3, 92px); gap: 8px; }
    .picker-close { float: right; border-radius: 999px; background: #f1f5f9; color: #475569; width: 28px; height: 28px; font-weight: 950; }
    .custom-shift { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
    .custom-shift input { min-width: 0; border: 1px solid var(--line); border-radius: 10px; padding: 9px; font-weight: 900; }
    .cell-color-tools { display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: end; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); }
    .cell-color-tools label { display: grid; gap: 5px; color: #475569; font-size: 12px; font-weight: 950; }
    .cell-color-tools input[type="color"] { width: 100%; min-width: 64px; height: 38px; border: 1px solid var(--line); border-radius: 8px; background: white; padding: 3px; cursor: pointer; }
    .employee-form { display: grid; grid-template-columns: 1fr 190px auto; gap: 10px; padding: 14px; border-bottom: 1px solid var(--line); background: #f8fafc; }
    .employee-form input, .employee-form select, .request-form input, .request-form select, .request-form textarea, .toolbar select { border: 1px solid var(--line); border-radius: 10px; background: white; padding: 9px 11px; font-weight: 850; outline: none; }
    .employee-table th, .employee-table td { padding: 10px 12px; text-align: left; height: auto; }
    .request-form { display: grid; grid-template-columns: 1fr 150px auto 150px auto; gap: 10px; padding: 14px; border-bottom: 1px solid var(--line); background: #f8fafc; }
    .request-form textarea { grid-column: 1 / -1; min-height: 74px; resize: vertical; }
    .request-calendar { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(7, minmax(36px, 1fr)); gap: 6px; }
    .request-dow { color: #64748b; text-align: center; font-size: 12px; font-weight: 950; }
    .request-day { min-height: 42px; border: 1px solid var(--line); border-radius: 10px; background: white; color: #334155; font-weight: 950; }
    .request-day.blank { visibility: hidden; pointer-events: none; }
    .request-day.selected { border-color: #4f46e5; background: #4f46e5; color: white; box-shadow: 0 8px 16px rgba(79,70,229,.2); }
    .request-selected { grid-column: 1 / -1; color: #475569; font-size: 12px; font-weight: 900; }
    .request-card { display: grid; grid-template-columns: 1fr auto; gap: 8px; border-bottom: 1px solid #eef2f7; padding: 14px; background: white; }
    .request-main { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .request-pill { border: 1px solid var(--line); border-radius: 999px; background: #f8fafc; padding: 5px 9px; color: #475569; font-size: 12px; font-weight: 900; }
    .request-note { grid-column: 1 / -1; color: #475569; font-size: 13px; line-height: 1.6; }
    .timeline { min-width: 900px; padding: 14px; }
    .timeline-grid { display: grid; grid-template-columns: 120px repeat(17, 48px); border-bottom: 1px solid var(--line); }
    .timeline-grid > div { padding: 8px 4px; font-size: 12px; font-weight: 850; border-right: 1px solid #eef2f7; }
    .bar-row { display: grid; grid-template-columns: 120px 816px; border-bottom: 1px solid #eef2f7; }
    .bar-name { padding: 13px 8px; font-size: 13px; font-weight: 950; background: white; }
    .bar-space { position: relative; height: 48px; }
    .bar { position: absolute; top: 8px; height: 32px; display: grid; place-items: center; border-radius: 9px; border: 1px solid; font-size: 12px; font-weight: 950; }
    .empty { padding: 48px; text-align: center; color: #94a3b8; font-weight: 900; }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 30; max-width: min(360px, calc(100vw - 36px)); border-radius: 14px; background: #0f172a; color: white; padding: 12px 14px; box-shadow: 0 14px 35px rgba(15,23,42,.22); font-size: 13px; font-weight: 900; }
    .login-divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: #94a3b8; font-size: 11px; font-weight: 900; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #e2e8f0; }
    .login-section { display: grid; gap: 10px; }
    .login-section h2 { margin: 0; font-size: 14px; text-align: center; }
    .login-section input { letter-spacing: 0; text-align: left; font-size: 15px; }
    .login-section .password-input { letter-spacing: .12em; text-align: center; }
    .finance-panel { height: 100%; overflow: auto; padding: 14px; background: #f8fafc; }
    .finance-dashboard { width: min(1420px, 100%); margin: 0 auto; display: grid; gap: 12px; }
    .finance-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .finance-title h2 { margin: 0; font-size: 20px; }
    .finance-title p { margin: 4px 0 0; color: var(--muted); font-size: 12px; font-weight: 800; }
    .finance-month-control { display: flex; align-items: center; gap: 8px; }
    .finance-month-control label { color: #475569; font-size: 12px; font-weight: 900; }
    .finance-month-control select, .finance-month-control input { border: 1px solid var(--line); border-radius: 10px; background: white; padding: 9px 10px; font-weight: 900; }
    .finance-tabs { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 6px; padding: 5px; border: 1px solid var(--line); border-radius: 12px; background: #e8eef5; }
    .finance-tab { min-height: 38px; border-radius: 8px; background: transparent; color: #64748b; font-size: 12px; font-weight: 950; }
    .finance-tab.active { background: white; color: #111827; box-shadow: 0 2px 8px rgba(15,23,42,.08); }
    .finance-kpis { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .finance-kpi, .finance-card { border: 1px solid #d7e0ea; border-radius: 8px; background: white; box-shadow: 0 5px 16px rgba(15,23,42,.04); }
    .finance-kpi { min-height: 104px; padding: 15px; display: grid; align-content: space-between; gap: 8px; }
    .finance-kpi-label { color: #64748b; font-size: 12px; font-weight: 900; }
    .finance-kpi-value { font-size: 24px; font-weight: 950; font-variant-numeric: tabular-nums; }
    .finance-delta { width: fit-content; border-radius: 999px; background: #f1f5f9; color: #475569; padding: 3px 7px; font-size: 11px; font-weight: 950; }
    .finance-delta.up { background: #dcfce7; color: #166534; }
    .finance-delta.down { background: #fee2e2; color: #b91c1c; }
    .finance-grid { display: grid; grid-template-columns: minmax(0, 1.15fr) minmax(340px, .85fr); gap: 12px; }
    .finance-card { padding: 14px; min-width: 0; }
    .finance-card h3 { margin: 0 0 4px; font-size: 14px; }
    .finance-card-note { margin: 0 0 12px; color: #64748b; font-size: 11px; font-weight: 800; }
    .finance-table-wrap { overflow: auto; border: 1px solid #d7e0ea; }
    .finance-table { min-width: 620px; border: 0; table-layout: auto; }
    .finance-table th, .finance-table td { position: static; height: auto; padding: 9px 10px; text-align: right; font-size: 12px; }
    .finance-table th:first-child, .finance-table td:first-child { text-align: left; }
    .finance-table th { background: #f1f5f9; }
    .finance-table .section-row td { background: #e8eef5; color: #334155; font-weight: 950; text-align: left; }
    .finance-number { font-variant-numeric: tabular-nums; font-weight: 900; }
    .chart-box { position: relative; width: 100%; min-height: 260px; }
    .chart-box canvas { width: 100% !important; height: 260px !important; }
    .fallback-chart { height: 230px; display: flex; align-items: end; gap: 6px; padding: 12px 4px 24px; border-bottom: 1px solid #cbd5e1; }
    .fallback-bar { flex: 1; min-width: 12px; position: relative; border-radius: 4px 4px 0 0; background: #4f46e5; }
    .fallback-bar span { position: absolute; left: 50%; bottom: -21px; transform: translateX(-50%); color: #64748b; font-size: 8px; font-weight: 900; white-space: nowrap; }
    .trend-values { display: grid; grid-template-columns: repeat(13, minmax(56px, 1fr)); gap: 5px; margin-top: 10px; overflow-x: auto; }
    .trend-point { border: 1px solid #dbe3ed; border-radius: 6px; background: #f8fafc; padding: 6px; text-align: center; }
    .trend-point span { display: block; color: #64748b; font-size: 9px; font-weight: 900; }
    .trend-point strong { display: block; margin-top: 2px; font-size: 10px; font-variant-numeric: tabular-nums; }
    .coach-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .coach-toolbar select { border: 1px solid var(--line); border-radius: 9px; background: white; padding: 8px 10px; font-weight: 900; }
    .coach-performance-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .coach-performance-card { min-width: 0; }
    .coach-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; margin: 10px 0; }
    .coach-stat { border-left: 3px solid #4f46e5; background: #f8fafc; padding: 7px 8px; }
    .coach-stat span { display: block; color: #64748b; font-size: 9px; font-weight: 900; }
    .coach-stat strong { display: block; margin-top: 2px; font-size: 13px; font-variant-numeric: tabular-nums; }
    .finance-form { display: grid; gap: 12px; }
    .finance-form-section { border: 1px solid #d7e0ea; border-radius: 8px; background: white; padding: 12px; }
    .finance-form-section h3 { margin: 0 0 10px; font-size: 14px; }
    .finance-fields { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 9px; }
    .finance-field { display: grid; gap: 5px; color: #475569; font-size: 11px; font-weight: 900; }
    .finance-field input { min-width: 0; width: 100%; border: 1px solid var(--line); border-radius: 8px; background: #f8fafc; padding: 9px; font-weight: 900; }
    .finance-coach-row { display: grid; grid-template-columns: minmax(145px, 1.2fr) repeat(4, minmax(90px, 1fr)); gap: 8px; align-items: end; padding: 9px 0; border-bottom: 1px solid #eef2f7; }
    .finance-coach-row:last-child { border-bottom: 0; }
    .finance-coach-name { align-self: center; font-size: 12px; font-weight: 950; }
    .finance-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .finance-imports { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .finance-drop { border: 1px dashed #94a3b8; border-radius: 8px; background: #f8fafc; padding: 14px; }
    .finance-drop strong, .finance-drop small { display: block; }
    .finance-drop small { margin: 5px 0 10px; color: #64748b; line-height: 1.5; }
    .finance-drop input { width: 100%; }
    .finance-import-preview { border: 1px solid #c7d2fe; border-radius: 8px; background: #eef2ff; padding: 12px; }
    .finance-import-preview.error { border-color: #fecaca; background: #fef2f2; }
    .finance-status { border-radius: 8px; padding: 10px 12px; background: #eff6ff; color: #1d4ed8; font-size: 12px; font-weight: 900; }
    .finance-status.error { background: #fef2f2; color: #b91c1c; }
    .owner-setup { margin-top: 14px; border: 1px solid #c7d2fe; border-radius: 14px; background: #eef2ff; overflow: hidden; }
    .owner-setup summary { cursor: pointer; padding: 12px 14px; color: #3730a3; text-align: center; font-size: 13px; font-weight: 950; }
    .owner-setup form { padding: 0 12px 12px; }
    .verification-box { display: grid; gap: 9px; margin-top: 12px; border: 1px solid #86efac; border-radius: 12px; background: #f0fdf4; padding: 12px; color: #166534; text-align: center; font-size: 12px; font-weight: 900; line-height: 1.6; }
    .verification-details { border-radius: 9px; background: rgba(255,255,255,.72); padding: 9px; color: #475569; font-size: 11px; line-height: 1.7; }
    .verification-details strong { color: #0f172a; }

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js" defer></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp, doc, setDoc, getDoc, getDocs } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail, signOut, onAuthStateChanged, reload, setPersistence, inMemoryPersistence } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

    const firebaseConfig = {
      apiKey: 'AIzaSyBwypaoiORkxJZqjbg-3XkHwmCHM7vTIZM',
      authDomain: 'igym-1fca5.firebaseapp.com',
      projectId: 'igym-1fca5',
      storageBucket: 'igym-1fca5.firebasestorage.app',
      messagingSenderId: '225172176853',
      appId: '1:225172176853:web:aa924ce203f7a948a1875c'
    };

    const OWNER_EMAIL = 'ed56671056@gmail.com';
    const PUBLIC_APP_URL = 'https://brother8778-design.github.io/brother8888.github.io/';
    const EMAIL_ACTION_SETTINGS = { url: PUBLIC_APP_URL, handleCodeInApp: false };
    const firebaseApp = initializeApp(firebaseConfig);
    const provisioningApp = initializeApp(firebaseConfig, 'igym-admin-provisioning');
    const firestoreDb = getFirestore(firebaseApp);
    const firebaseAuth = getAuth(firebaseApp);
    const provisioningAuth = getAuth(provisioningApp);
    await setPersistence(provisioningAuth, inMemoryPersistence);

    function adminRecord(snapshot, fallback = {}) {
      const data = snapshot?.data?.() || fallback;
      return {
        uid: snapshot?.id || fallback.uid || '',
        email: data.email || '',
        displayName: data.displayName || '',
        role: data.role || 'manager',
        active: data.active === true,
        emailVerified: data.emailVerified === true,
        createdAt: data.createdAt || null,
        createdBy: data.createdBy || ''
      };
    }

    async function ensureOwnerAdmin(user, displayName = '最高主管') {
      if (!user || user.email?.toLowerCase() !== OWNER_EMAIL || !user.emailVerified) return;
      const ownerRef = doc(firestoreDb, 'admins', user.uid);
      const ownerSnapshot = await getDoc(ownerRef);
      if (!ownerSnapshot.exists()) {
        await setDoc(ownerRef, {
          email: OWNER_EMAIL,
          displayName: displayName || '最高主管',
          role: 'owner',
          active: true,
          emailVerified: true,
          createdAt: serverTimestamp(),
          createdBy: user.uid,
          lastLoginAt: serverTimestamp()
        });
      }
    }

    async function verifyManager(user) {
      if (!user) throw new Error('請先登入主管帳號');
      await reload(user);
      if (!user.emailVerified) throw new Error('請先到信箱完成 Email 驗證');
      await ensureOwnerAdmin(user);
      const adminSnapshot = await getDoc(doc(firestoreDb, 'admins', user.uid));
      if (!adminSnapshot.exists() || adminSnapshot.data()?.active !== true) {
        throw new Error('此帳號沒有主管權限，或帳號目前已停用');
      }
      await setDoc(doc(firestoreDb, 'admins', user.uid), {
        emailVerified: true,
        lastLoginAt: serverTimestamp()
      }, { merge: true });
      return adminRecord(adminSnapshot, { uid: user.uid, email: user.email || '' });
    }

    async function requireOwner() {
      const manager = await verifyManager(firebaseAuth.currentUser);
      if (manager.role !== 'owner') throw new Error('只有最高主管可以管理主管帳號');
      return manager;
    }

    window.firebaseApp = firebaseApp;
    window.firestoreDb = firestoreDb;
    window.firebaseAuth = firebaseAuth;
    window.OWNER_EMAIL = OWNER_EMAIL;
    window.PUBLIC_APP_URL = PUBLIC_APP_URL;
    window.bootstrapOwnerAccount = async function bootstrapOwnerAccount(displayName, password) {
      let user;
      try {
        const credential = await createUserWithEmailAndPassword(firebaseAuth, OWNER_EMAIL, password);
        user = credential.user;
      } catch (error) {
        if (error?.code !== 'auth/email-already-in-use') throw error;
        const credential = await signInWithEmailAndPassword(firebaseAuth, OWNER_EMAIL, password);
        user = credential.user;
      }
      await reload(user);
      if (!user.emailVerified) {
        await sendEmailVerification(user, EMAIL_ACTION_SETTINGS);
        return { pendingVerification: true, email: OWNER_EMAIL };
      }
      await ensureOwnerAdmin(user, displayName);
      return verifyManager(user);
    };
    window.refreshOwnerVerification = async function refreshOwnerVerification() {
      const user = firebaseAuth.currentUser;
      if (!user) throw new Error('請重新輸入最高主管 Email 與密碼');
      await reload(user);
      if (!user.emailVerified) return { pendingVerification: true, email: user.email || OWNER_EMAIL };
      await ensureOwnerAdmin(user);
      return verifyManager(user);
    };
    window.resendOwnerVerification = async function resendOwnerVerification() {
      const user = firebaseAuth.currentUser;
      if (!user) throw new Error('請先用原本的主管 Email 與密碼登入');
      await reload(user);
      if (user.emailVerified) {
        await ensureOwnerAdmin(user);
        return verifyManager(user);
      }
      await sendEmailVerification(user, EMAIL_ACTION_SETTINGS);
      return { pendingVerification: true, email: user.email || OWNER_EMAIL };
    };
    window.signInFinanceManager = async function signInFinanceManager(email, password) {
      const credential = await signInWithEmailAndPassword(firebaseAuth, email, password);
      await reload(credential.user);
      if (!credential.user.emailVerified) return { pendingVerification: true, email: credential.user.email || email };
      try {
        return await verifyManager(credential.user);
      } catch (error) {
        await signOut(firebaseAuth);
        throw error;
      }
    };
    window.signOutFinanceManager = async function signOutFinanceManager() {
      await signOut(firebaseAuth);
      return true;
    };
    window.listManagerAccounts = async function listManagerAccounts() {
      await requireOwner();
      const snapshot = await getDocs(collection(firestoreDb, 'admins'));
      return snapshot.docs.map(item => adminRecord(item)).sort((left, right) => {
        if (left.role !== right.role) return left.role === 'owner' ? -1 : 1;
        return left.displayName.localeCompare(right.displayName, 'zh-Hant');
      });
    };
    window.createManagerAccount = async function createManagerAccount({ email, displayName, password }) {
      const owner = await requireOwner();
      const normalizedEmail = String(email || '').trim().toLowerCase();
      const normalizedName = String(displayName || '').trim();
      if (!normalizedEmail || !normalizedName || String(password || '').length < 6) throw new Error('請填寫姓名、Email 與至少 6 碼臨時密碼');
      if (normalizedEmail === OWNER_EMAIL) throw new Error('最高主管帳號已固定，不能重複建立');
      let newUser;
      try {
        const credential = await createUserWithEmailAndPassword(provisioningAuth, normalizedEmail, password);
        newUser = credential.user;
        await sendEmailVerification(newUser, EMAIL_ACTION_SETTINGS);
        await setDoc(doc(firestoreDb, 'admins', newUser.uid), {
          email: normalizedEmail,
          displayName: normalizedName,
          role: 'manager',
          active: true,
          emailVerified: false,
          verificationSentAt: serverTimestamp(),
          createdAt: serverTimestamp(),
          createdBy: owner.uid
        });
        return { uid: newUser.uid, email: normalizedEmail, displayName: normalizedName, role: 'manager', active: true, emailVerified: false };
      } finally {
        if (provisioningAuth.currentUser) await signOut(provisioningAuth);
      }
    };
    window.resendManagerVerification = async function resendManagerVerification(email, password) {
      const owner = await requireOwner();
      const credential = await signInWithEmailAndPassword(provisioningAuth, String(email || '').trim(), password);
      try {
        await sendEmailVerification(credential.user, EMAIL_ACTION_SETTINGS);
        await setDoc(doc(firestoreDb, 'admins', credential.user.uid), {
          verificationSentAt: serverTimestamp(),
          updatedBy: owner.uid,
          updatedAt: serverTimestamp()
        }, { merge: true });
        return true;
      } finally {
        await signOut(provisioningAuth);
      }
    };
    window.setManagerAccountActive = async function setManagerAccountActive(uid, active) {
      const owner = await requireOwner();
      const targetRef = doc(firestoreDb, 'admins', uid);
      const targetSnapshot = await getDoc(targetRef);
      if (!targetSnapshot.exists()) throw new Error('找不到此主管帳號');
      if (targetSnapshot.data()?.role === 'owner') throw new Error('最高主管帳號不能停用');
      await setDoc(targetRef, { active: active === true, updatedBy: owner.uid, updatedAt: serverTimestamp() }, { merge: true });
      return true;
    };
    window.sendManagerPasswordReset = async function sendManagerPasswordReset(email) {
      await requireOwner();
      await sendPasswordResetEmail(firebaseAuth, String(email || '').trim(), EMAIL_ACTION_SETTINGS);
      return true;
    };
    window.loadFinanceMonthsFromCloud = async function loadFinanceMonthsFromCloud() {
      await verifyManager(firebaseAuth.currentUser);
      const snapshot = await getDocs(collection(firestoreDb, 'finance_months'));
      return snapshot.docs.map(item => ({ period: item.id, ...item.data() }));
    };
    window.saveFinanceMonthToCloud = async function saveFinanceMonthToCloud(period, data) {
      const manager = await verifyManager(firebaseAuth.currentUser);
      return setDoc(doc(firestoreDb, 'finance_months', period), {
        ...data,
        period,
        updatedBy: manager.uid,
        updatedAt: serverTimestamp()
      }, { merge: false });
    };
    window.seedFinanceMonthsToCloud = async function seedFinanceMonthsToCloud(entries) {
      const manager = await verifyManager(firebaseAuth.currentUser);
      const rows = Array.isArray(entries) ? entries : [];
      await Promise.all(rows.map(entry => setDoc(doc(firestoreDb, 'finance_months', entry.period), {
        ...entry.data,
        period: entry.period,
        updatedBy: manager.uid,
        updatedAt: serverTimestamp()
      }, { merge: false })));
      return rows.length;
    };
    window.writeLogToFirestore = async function writeLogToFirestore(data) {
      return addDoc(collection(firestoreDb, 'logs'), {
        ...data,
        createdAt: serverTimestamp(),
        pageUrl: location.href,
        userAgent: navigator.userAgent
      });
    };
    window.writeCustomerInquiryToFirestore = async function writeCustomerInquiryToFirestore(data) {
      return addDoc(collection(firestoreDb, 'customer_inquiries'), {
        ...data,
        timestamp: Date.now(),
        pageUrl: location.href,
        userAgent: navigator.userAgent
      });
    };
    window.saveScheduleToCloud = async function saveScheduleToCloud(data) {
      return setDoc(doc(firestoreDb, 'schedules', 'main'), {
        ...data,
        updatedAt: serverTimestamp(),
        timestamp: Date.now(),
        pageUrl: location.href
      }, { merge: true });
    };
    window.loadScheduleFromCloud = async function loadScheduleFromCloud() {
      const snapshot = await getDoc(doc(firestoreDb, 'schedules', 'main'));
      return snapshot.exists() ? snapshot.data() : null;
    };
    onAuthStateChanged(firebaseAuth, async user => {
      if (!user) {
        window.dispatchEvent(new CustomEvent('manager-auth-changed', { detail: { authenticated: false } }));
        return;
      }
      await reload(user);
      if (!user.emailVerified) {
        window.dispatchEvent(new CustomEvent('manager-auth-changed', { detail: { authenticated: false, pendingVerification: true, email: user.email || '' } }));
        return;
      }
      try {
        const manager = await verifyManager(user);
        window.dispatchEvent(new CustomEvent('manager-auth-changed', { detail: { authenticated: true, user: manager } }));
      } catch (error) {
        console.warn('Firebase manager session rejected:', error);
        await signOut(firebaseAuth);
      }
    });
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

    function parseCsvRows(text) {
      const rows = [];
      let row = [], cell = '', quoted = false;
      const source = String(text || '').replace(/^\uFEFF/, '');
      for (let index = 0; index < source.length; index += 1) {
        const char = source[index];
        if (char === '"' && quoted && source[index + 1] === '"') { cell += '"'; index += 1; }
        else if (char === '"') quoted = !quoted;
        else if (char === ',' && !quoted) { row.push(cell.trim()); cell = ''; }
        else if ((char === '\n' || char === '\r') && !quoted) {
          if (char === '\r' && source[index + 1] === '\n') index += 1;
          row.push(cell.trim()); cell = '';
          if (row.some(value => value !== '')) rows.push(row);
          row = [];
        } else cell += char;
      }
      row.push(cell.trim());
      if (row.some(value => value !== '')) rows.push(row);
      return rows;
    }
    function parseFinanceCsv(text, type) {
      const table = parseCsvRows(text);
      const expected = type === 'store' ? financeCsvStoreHeaders : financeCsvCoachHeaders;
      const headers = table.shift() || [];
      const errors = [];
      expected.forEach(header => { if (!headers.includes(header)) errors.push(`缺少欄位：${header}`); });
      const rows = table.map((cells, rowIndex) => Object.fromEntries(headers.map((header, index) => [header, cells[index] ?? ''])));
      rows.forEach((row, index) => {
        const line = index + 2;
        if (!/^\d{4}-\d{2}$/.test(row.period || '')) errors.push(`第 ${line} 列月份格式應為 YYYY-MM`);
        if (type === 'coach' && !(row.employeeId || row.coachName)) errors.push(`第 ${line} 列需要 employeeId 或 coachName`);
        expected.filter(header => !['period','employeeId','coachName'].includes(header)).forEach(header => {
          const value = Number(row[header]);
          if (!Number.isFinite(value) || value < 0) errors.push(`第 ${line} 列 ${header} 必須是 0 以上的數字`);
          else row[header] = value;
        });
      });
      return { type, rows, errors };
    }
    async function handleFinanceCsvFile(file, type) {

    function downloadFile(filename, content, type) {

      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);

      setTimeout(() => {

      showToast(`HTML 已下載：${filename}`);
    }
    function printSchedule() {
      showToast('列印視窗開啟後，請選擇列印或另存 PDF');
      setTimeout(() => window.print(), 80);
    }
    function render() {
      if (state.view === 'login') return renderLogin();
      if (state.tab === 'daily') renderDaily();
      else if (state.tab === 'employees') renderEmployees();
      else if (state.tab === 'requests') renderRequests();
      else if (state.tab === 'finance' && state.view === 'admin' && state.adminAuthenticated) renderFinance();
      else renderWeekly();
    }
    document.addEventListener('click', async event => {
      if (event.target.id === 'picker') {
        state.selected = null;
        render();
        return;
      }
      const target = event.target.closest('[data-action],[data-tab],[data-quick],[data-date],[data-copy-date],[data-pick],[data-delete],[data-edit],[data-move],[data-person-filter],[data-request-delete],[data-request-date],[data-finance-section]');
      if (!target) {
        if (state.selected && event.target.closest('#picker .picker-card')) return;
        if (state.selected) { state.selected = null; render(); }
        return;
      }
      if (target.dataset.tab) {
        if (target.dataset.tab === 'finance' && (!state.adminAuthenticated || state.view !== 'admin')) return;
        state.tab = target.dataset.tab;
        render();
        return;
      }
      if (target.dataset.financeSection) {
        if (target.dataset.financeSection === 'accounts' && state.managerUser?.role !== 'owner') return;
        state.financeSection = target.dataset.financeSection;
        state.financeStatus = '';
        state.financeError = '';
        render();
        return;
      }
      if (target.dataset.personFilter) {
        const id = target.dataset.personFilter;
        const current = Array.isArray(state.personFilter) ? state.personFilter : [];
        state.personFilter = id === 'all'
          ? []
          : (current.includes(id) ? current.filter(item => item !== id) : [...current, id]);
        render();
        return;
      }
      if (target.dataset.requestDate) {
        const date = target.dataset.requestDate;
        state.requestSelectedDates = state.requestSelectedDates.includes(date)
          ? state.requestSelectedDates.filter(item => item !== date)
          : [...state.requestSelectedDates, date].sort();
        updateRequestSelectionDisplay();
        return;
      }
      if (target.dataset.quick) { state.quick = state.quick === target.dataset.quick ? null : target.dataset.quick; render(); return; }
      if (target.dataset.copyDate && state.view === 'admin') {
        const date = target.dataset.copyDate;
        state.copyDayMode = true;
        if (!state.copyDaySource) {
          state.copyDaySource = date;
          showToast(`已複製 ${date}，再點其他日期貼上`);
          render();
          return;
        }
        if (state.copyDaySource === date) {
          showToast('已選這天當來源，請點其他日期貼上');
          return;
        }
        const next = cloneData(state.schedule);
        const source = cloneData(state.schedule[state.copyDaySource] || {});
        if (Object.keys(source).length) next[date] = source;
        else delete next[date];
        pushSchedule(next);
        showToast(`已貼上到 ${date}`);
        render();
        return;
      }
      if (target.dataset.date && state.view === 'admin') {
        const date = target.dataset.date, emp = target.dataset.emp;
        if (state.copyDayMode) {
          if (!state.copyDaySource) {
            state.copyDaySource = date;
            showToast(`已複製 ${date}，再點其他日期任一格貼上`);
            render();
            return;
          }
          if (state.copyDaySource === date) {
            showToast('已選這天當來源，請點其他日期貼上');
            return;
          }
          const next = cloneData(state.schedule);
          const source = cloneData(state.schedule[state.copyDaySource] || {});
          if (Object.keys(source).length) next[date] = source;
          else delete next[date];
          pushSchedule(next);
          showToast(`已貼上到 ${date}`);
          render();
          return;
        }
        if (state.quick === 'CLEAR') setShift(date, emp, null);
        else if (state.quick) setShift(date, emp, state.quick);
        else { state.selected = { date, emp }; render(); }
        return;
      }
      if ('pick' in target.dataset && state.selected) {
        const selected = state.selected;
        state.selected = null;
        setShift(selected.date, selected.emp, target.dataset.pick || null);
        return;
      }
      if (target.dataset.delete) {
        const id = target.dataset.delete;
        state.employees = state.employees.filter(emp => emp.id !== id);
        const next = cloneData(state.schedule);
        Object.keys(next).forEach(date => { delete next[date][id]; if (!Object.keys(next[date]).length) delete next[date]; });
        state.schedule = next;
        const nextColors = cloneData(state.cellColors || {});
        Object.keys(nextColors).forEach(date => {
          delete nextColors[date][id];
          if (!Object.keys(nextColors[date]).length) delete nextColors[date];
        });
        state.cellColors = nextColors;
        normalizeEmployeeOrder();
        save();
        render();
        return;
      }
      if (target.dataset.requestDelete) {
        state.requests = state.requests.filter(item => item.id !== target.dataset.requestDelete);
        save();
        render();
        return;
      }
      const action = target.dataset.action;
      if (action === 'refreshOwnerVerification') {
        try {
          const result = await window.refreshOwnerVerification();
          if (result?.pendingVerification) {
            state.ownerVerificationPending = true;
            state.ownerVerificationEmail = result.email || state.ownerVerificationEmail;
            showToast('Email 尚未完成驗證，請點開信件中的驗證連結');
            render();
            return;
          }
          state.ownerVerificationPending = false;
          state.adminAuthenticated = true;
          state.managerUser = result;
          state.view = 'admin';
          state.tab = 'weekly';
          render();
        } catch (error) {
          showToast(firebaseAuthErrorMessage(error, error.message || 'Email 驗證確認失敗'));
        }
        return;
      }
      if (action === 'resendOwnerVerification') {
        if (ownerVerificationCooldownSeconds() > 0) return;
        try {
          if (!window.resendOwnerVerification) throw new Error('Firebase 驗證服務尚未完成載入');
          const result = await window.resendOwnerVerification();
          if (!result?.pendingVerification) {
            state.ownerVerificationPending = false;
            state.adminAuthenticated = true;
            state.managerUser = result;
            state.view = 'admin';
            state.tab = 'weekly';
            render();
            return;
          }
          state.ownerVerificationPending = true;
          state.ownerVerificationEmail = result.email || state.ownerVerificationEmail;
          state.ownerVerificationResendAt = Date.now() + 60 * 1000;
          showToast('新的 Email 驗證連結已寄出');
          render();
        } catch (error) {
          console.error('Verification resend failed:', error);
          if (error?.code === 'auth/too-many-requests') state.ownerVerificationResendAt = Date.now() + 60 * 1000;
          showToast(firebaseAuthErrorMessage(error, error.message || 'Email 驗證連結寄送失敗'));
          render();
        }
        return;
      }
      if (action === 'cancelOwnerVerification') {
        try { await window.signOutFinanceManager?.(); } catch {}
        state.ownerVerificationPending = false;
        state.ownerVerificationEmail = '';
        state.ownerVerificationResendAt = 0;
        render();
        return;
      }
      if (action === 'logout') {
        if (state.adminAuthenticated && window.signOutFinanceManager) {
          try { await window.signOutFinanceManager(); } catch (error) { console.warn('Manager sign-out failed:', error); }
        }
        clearFinanceCharts();
        state.view = 'login';
        state.tab = 'weekly';
        state.quick = null;
        state.editingEmployee = null;
        state.adminAuthenticated = false;
        state.managerUser = null;
        state.ownerVerificationPending = false;
        state.ownerVerificationEmail = '';
        state.ownerVerificationResendAt = 0;
        state.financeLoaded = false;
        state.financeMonths = {};
        state.managerAccounts = [];
        state.managerAccountsLoaded = false;
        render();
        return;
      }
      if (action === 'closePicker') { state.selected = null; render(); return; }
      if (action === 'applyCellColor' && state.selected) {
        setCellColor(state.selected.date, state.selected.emp, document.getElementById('cellColorInput')?.value);
        return;
      }
      if (action === 'clearCellColor' && state.selected) {
        setCellColor(state.selected.date, state.selected.emp, '');
        return;
      }
      if (action === 'saveCustomShift' && state.selected) {
        const start = Number(document.getElementById('customStart')?.value);
        const end = Number(document.getElementById('customEnd')?.value);
        if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end > 24 || end <= start) {
          showToast('請輸入正確時間，例如 10 到 18');
          return;
        }
        const selected = state.selected;
        state.selected = null;
        setShift(selected.date, selected.emp, customShiftId(start, end));
        return;
      }
      if (action === 'prev4') { state.baseDate.setDate(state.baseDate.getDate() - scheduleStepDays()); render(); }
      if (action === 'next4') { state.baseDate.setDate(state.baseDate.getDate() + scheduleStepDays()); render(); }
      if (action === 'todayRange') { state.baseDate = new Date(SCHEDULE_START); render(); }
      if (action === 'prevDay') { state.timelineDate.setDate(state.timelineDate.getDate() - 1); render(); }
      if (action === 'nextDay') { state.timelineDate.setDate(state.timelineDate.getDate() + 1); render(); }
      if (action === 'print') { printSchedule(); return; }
      if (action === 'html') { exportHtml(); return; }
      if (action === 'exportData') { exportData(); return; }
      if (action === 'importData') { document.getElementById('importDataFile')?.click(); return; }
      if (action === 'uploadCloud') { await uploadScheduleCloud(); return; }
      if (action === 'loadCloud') { await loadScheduleCloud(); return; }
      if (action === 'toggleTop') { state.topCollapsed = !state.topCollapsed; render(); return; }
      if (action === 'toggleCopyDay') {
        state.copyDayMode = !state.copyDayMode;
        if (!state.copyDayMode) state.copyDaySource = null;
        showToast(state.copyDayMode ? '請點來源日期的任一格' : '已關閉複製日期');
        render();
        return;
      }
      if (action === 'cancelCopyDay') { state.copyDayMode = false; state.copyDaySource = null; render(); return; }
      if (action === 'toggleControls') {
        if (isMobileView() || isLandscapeMobileView()) state.controlsOpen = !state.controlsOpen;
        else state.desktopControlsCollapsed = !state.desktopControlsCollapsed;
        render();
        return;
      }
      if (action === 'toggleAlerts') { state.alertsOpen = !state.alertsOpen; render(); return; }
      if (action === 'refreshManagerAccounts') {
        state.managerAccountsLoaded = false;
        await ensureManagerAccountsLoaded(true);
        return;
      }
      if (action === 'toggleManagerActive') {
        try {
          state.financeStatus = '正在更新主管權限...';
          state.financeError = '';
          render();
          await window.setManagerAccountActive(target.dataset.uid, target.dataset.active === 'true');
          state.financeStatus = target.dataset.active === 'true' ? '主管帳號已啟用' : '主管帳號已停用';
          state.managerAccountsLoaded = false;
          await ensureManagerAccountsLoaded(true);
        } catch (error) {
          console.error('Manager active-state update failed:', error);
          financeStatus(error.message || '主管權限更新失敗', true);
        }
        return;
      }
      if (action === 'resetManagerPassword') {
        try {
          await window.sendManagerPasswordReset(target.dataset.email);
          state.financeStatus = `密碼重設信已寄到 ${target.dataset.email}`;
          state.financeError = '';
          render();
        } catch (error) {
          console.error('Manager password reset failed:', error);
          financeStatus(error.message || '密碼重設信寄送失敗', true);
        }
        return;
      }
      if (action === 'openManagerVerification') {
        state.managerVerificationTarget = { uid: target.dataset.uid, email: target.dataset.email };
        render();
        return;
      }
      if (action === 'cancelManagerVerification') {
        state.managerVerificationTarget = null;
        render();
        return;
      }
      if (action === 'confirmManagerVerification') {
        const password = document.getElementById('managerVerificationPassword')?.value || '';
        if (!password) {
          financeStatus('請輸入此主管目前密碼，才能安全重寄驗證信', true);
          return;
        }
        try {
          await window.resendManagerVerification(target.dataset.email, password);
          state.managerVerificationTarget = null;
          state.financeStatus = `驗證信已重新寄到 ${target.dataset.email}`;
          state.financeError = '';
          render();
        } catch (error) {
          console.error('Manager verification resend failed:', error);
          financeStatus(error.message || '驗證信寄送失敗', true);
        }
        return;
      }
      if (action === 'saveFinanceMonth') {
        try {
          const { period, record } = collectFinanceMonthForm();
          financeStatus('正在儲存本月財報...');
          await saveFinanceRecord(period, record);
          state.financeStatus = `${period} 財報已儲存`;
          state.financeError = '';
          showToast(`${period} 財報已儲存`);
          render();
        } catch (error) {
          console.error('Finance month save failed:', error);
          financeStatus(error.message || '財報儲存失敗', true);
        }
        return;
      }
      if (action === 'applyFinanceImport') { await applyFinanceImport(); return; }
      if (action === 'clearFinanceImport') { state.financeImport = null; render(); return; }
      if (action === 'undo' && state.undo.length) { state.schedule = state.undo.shift(); save(); render(); }
      if (action === 'copyWeek') {
        const days = visibleScheduleDays();
        const next = cloneData(state.schedule);
        days.slice(0, 7).forEach(day => {
          const source = new Date(day.date);
          source.setDate(source.getDate() - 7);
          next[day.key] = cloneData(state.schedule[formatDate(source)] || {});
        });
        pushSchedule(next);
        render();
      }
      if (action === 'fillOff') {
        const days = visibleScheduleDays();
        const employees = sortEmployees(state.employees.filter(employeeVisible));
        const next = cloneData(state.schedule);
        days.forEach(day => {
          next[day.key] ||= {};
          employees.forEach(emp => {
            if (!next[day.key][emp.id]) next[day.key][emp.id] = 'O';
          });
        });
        pushSchedule(next);
        render();
      }
      if (action === 'addEmployee') {
        const name = document.getElementById('newName').value.trim();
        const role = document.getElementById('newRole').value;
        if (!name) return;
        state.employees.push({ id: 'emp_' + Date.now(), name, role, type: role === 'parttime' ? 'parttime' : 'fulltime', position: state.employees.length });
        normalizeEmployeeOrder();
        save();
        render();
      }
      if (action === 'moveEmployee') {
        const ordered = sortEmployees(state.employees);
        const index = ordered.findIndex(emp => emp.id === target.dataset.edit);
        const nextIndex = index + (target.dataset.move === 'up' ? -1 : 1);
        if (index < 0 || nextIndex < 0 || nextIndex >= ordered.length) return;
        const moved = [...ordered];
        [moved[index], moved[nextIndex]] = [moved[nextIndex], moved[index]];
        const positions = new Map(moved.map((emp, idx) => [emp.id, idx]));
        state.employees = state.employees.map(emp => ({ ...emp, position: positions.get(emp.id) ?? emp.position ?? 9999 }));
        normalizeEmployeeOrder();
        save();
        render();
      }
      if (action === 'editEmployee') {
        state.editingEmployee = target.dataset.edit;
        render();
      }
      if (action === 'cancelEmployeeEdit') {
        state.editingEmployee = null;
        render();
      }
      if (action === 'saveEmployee') {
        const id = target.dataset.edit;
        const name = document.getElementById('editName').value.trim();
        const role = document.getElementById('editRole').value;
        if (!name) return;
        state.employees = state.employees.map(emp => emp.id === id ? { ...emp, name, role, type: role === 'parttime' ? 'parttime' : 'fulltime' } : emp);
        state.editingEmployee = null;
        save();
        render();
      }
      if (action === 'clearRequestDates') {
        state.requestSelectedDates = [];
        updateRequestSelectionDisplay();
      }
      if (action === 'currentRequestMonth') {
        state.requestMonth = formatMonth(new Date());
        state.requestSelectedDates = [];
        render();
      }
      if (action === 'addRequest') {
        const employeeId = document.getElementById('requestEmployee').value;
        const employee = state.employees.find(emp => emp.id === employeeId);
        const name = employee?.name || '';
        const shift = document.getElementById('requestShift').value;
        const contact = document.getElementById('requestContact').value.trim();
        const note = document.getElementById('requestNote').value.trim();
        const dates = [...state.requestSelectedDates].sort();
        const submitButton = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-msg');
        const setStatus = (message, isError = false) => {
          if (!statusMsg) return;
          statusMsg.textContent = message;
          statusMsg.style.display = 'block';
          statusMsg.style.color = isError ? '#dc2626' : '#166534';
        };
        if (!name || !contact || !note || !dates.length) {
          setStatus('請完整填寫姓名、聯絡方式、日期與需求說明', true);
          return;
        }
        if (!window.writeCustomerInquiryToFirestore) {
          setStatus('Firebase 尚未完成載入，請稍後再試', true);
          return;
        }
        const requestLog = { id: 'req_' + Date.now(), name, contact, date: dates[0], dates, shift, shiftName: shiftInfo(shift)?.name || shift, note, createdAt: formatDate(new Date()) };
        try {
          if (submitButton) submitButton.disabled = true;
          setStatus('正在傳送...');
          await window.writeCustomerInquiryToFirestore({ type: 'shift_request', ...requestLog });
          console.log('資料已成功寫入資料庫');
          state.requests.push(requestLog);
          state.requestSelectedDates = [];
          document.getElementById('requestContact').value = '';
          document.getElementById('requestNote').value = '';
          save();
          updateRequestSelectionDisplay();
          setStatus('🎉 訊息已成功送出！');
          showToast('訊息已成功送出');
          setTimeout(() => { if (statusMsg) statusMsg.style.display = 'none'; }, 3000);
        } catch (error) {
          console.error('Firebase 寫入失敗:', error);
          setStatus('❌ 送出失敗，請稍後再試', true);
        } finally {
          if (submitButton) submitButton.disabled = false;
        }
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && state.selected) {
        state.selected = null;
        render();
      }
    });
    document.addEventListener('change', event => {
      if (event.target.dataset.action === 'filter') {
        state.filter = event.target.value;
        state.personFilter = [];
        render();
      }
      if (event.target.dataset.action === 'requestMonth') {
        state.requestMonth = event.target.value || formatMonth(new Date());
        state.requestSelectedDates = [];
        render();
      }
      if (event.target.dataset.action === 'financePeriodSelect') {
        state.financeSelectedPeriod = event.target.value;
        state.financeStatus = '';
        state.financeError = '';
        render();
      }
      if (event.target.dataset.action === 'financeCoachSelect') {
        state.financeCoachId = event.target.value;
        render();
      }
      if (event.target.id === 'financePeriod') {
        const period = event.target.value;
        if (/^\d{4}-\d{2}$/.test(period)) {
          state.financeSelectedPeriod = period;
          if (!state.financeMonths[period]) state.financeMonths[period] = financeMonthSeed(period);
          render();
        }
      }
      if (event.target.id === 'financeStoreCsv') {
        handleFinanceCsvFile(event.target.files?.[0], 'store');
        event.target.value = '';
      }
      if (event.target.id === 'financeCoachCsv') {
        handleFinanceCsvFile(event.target.files?.[0], 'coach');
        event.target.value = '';
      }
      if (event.target.dataset.action === 'importDataFile') {
        importDataFile(event.target.files?.[0]);
        event.target.value = '';
      }
    });
    window.addEventListener('resize', () => {
      clearTimeout(window.__scheduleResizeTimer);
      window.__scheduleResizeTimer = setTimeout(() => {
        if (state.view !== 'login') render();
      }, 160);
    });
    window.addEventListener('manager-auth-changed', event => {
      const detail = event.detail || {};
      if (detail.authenticated) {
        state.adminAuthenticated = true;
        state.managerUser = detail.user || null;
        state.ownerVerificationPending = false;
        state.ownerVerificationEmail = '';
        state.ownerVerificationResendAt = 0;
        if (state.view === 'login') {
          state.view = 'admin';
          state.tab = 'weekly';
        }
        render();
      } else if (detail.pendingVerification && state.view === 'login') {
        state.ownerVerificationPending = true;
        state.ownerVerificationEmail = detail.email || '';
        render();
      } else if (state.view === 'admin') {
        clearFinanceCharts();
        state.adminAuthenticated = false;
        state.managerUser = null;
        state.financeLoaded = false;
        state.financeMonths = {};
        state.managerAccounts = [];
        state.managerAccountsLoaded = false;
        state.view = 'login';
        state.tab = 'weekly';
        render();
      }
    });
    load();
    render();
    function autoLoadCloudIfEmpty() {
      if (!Object.keys(state.schedule || {}).length) loadScheduleCloud({ silent: true });
    }
    window.addEventListener('firebase-ready', autoLoadCloudIfEmpty);
    if (window.loadScheduleFromCloud) autoLoadCloudIfEmpty();
  </script>
</body>
</html>
