    function load() {
      try {
        if (new URLSearchParams(location.search).has('reset')) {
          localStorage.removeItem(STORAGE_KEY);
          history.replaceState(null, '', location.pathname);
          return;
        }
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (Array.isArray(saved.employees)) state.employees = saved.employees;
        if (saved.schedule) state.schedule = saved.schedule;
        if (Array.isArray(saved.requests)) state.requests = saved.requests;
        syncOfficialEmployees();
      } catch { localStorage.removeItem(STORAGE_KEY); }
    }
    function syncOfficialEmployees() {
      const existing = new Map(state.employees.map(emp => [emp.id, emp]));
      defaults.forEach(emp => {
        if (!existing.has(emp.id)) state.employees.push(cloneData(emp));
      });
      normalizeEmployeeOrder();
      save();
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ employees: state.employees, schedule: state.schedule, requests: state.requests }));
    }
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    function formatMonth(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }
    function getMonthDays(monthKey) {
      const [year, month] = monthKey.split('-').map(Number);
      const first = new Date(year, month - 1, 1);
      const total = new Date(year, month, 0).getDate();
      const leading = first.getDay();
      return [
        ...Array.from({ length: leading }, () => null),
        ...Array.from({ length: total }, (_, index) => {
          const day = String(index + 1).padStart(2, '0');
          return `${monthKey}-${day}`;
        })
      ];
    }
    function holidayName(dateKey) {
      return variableHolidays[dateKey] || recurringHolidays[dateKey.slice(5)] || '';
    }
    function weekStart(date) {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() + ((8 - day) % 7));
      d.setHours(0,0,0,0);
      return d;
    }
    function days28() {
      const current = weekStart(state.baseDate);
      const today = formatDate(new Date());
      return Array.from({ length: 28 }, (_, i) => {
        const d = new Date(current);
        d.setDate(current.getDate() + i);
        const key = formatDate(d);
        return { date: d, key, dow: ['日','一','二','三','四','五','六'][d.getDay()], monday: d.getDay() === 1, weekend: d.getDay() === 0 || d.getDay() === 6, today: key === today, holiday: holidayName(key) };
      });
    }
    function isMobileView() {
      return window.matchMedia && window.matchMedia('(max-width: 760px)').matches;
    }
    function visibleScheduleDays() {
      return isMobileView() ? days28().slice(0, 7) : days28();
    }
    function roleLabel(role) {
      return roles.find(item => item.id === role)?.name || role;
    }
    function employeeRank(emp) {
      const order = new Map(roles.map((role, index) => [role.id, index]));
      return `${String(order.get(emp.role) ?? 99).padStart(2, '0')}-${emp.name}`;
    }
    function normalizeEmployeeOrder() {
      state.employees = [...state.employees].sort((a, b) => {
        const aPos = Number.isFinite(a.position) ? a.position : null;
        const bPos = Number.isFinite(b.position) ? b.position : null;
        if (aPos !== null || bPos !== null) return (aPos ?? 9999) - (bPos ?? 9999);
        return employeeRank(a).localeCompare(employeeRank(b), 'zh-Hant');
      }).map((emp, index) => ({ ...emp, position: index }));
    }
    function sortEmployees(list) {
      return [...list].sort((a, b) => {
        const posDiff = (a.position ?? 9999) - (b.position ?? 9999);

      });
    }
    function roleMatches(emp, filter) {

      return emp.role === filter;
    }
    function employeeVisible(emp) {

    function customShiftId(start, end) {
      return `C_${Number(start)}_${Number(end)}`;

    function shiftInfo(shiftId) {
      if (shifts[shiftId]) return shifts[shiftId];
      const match = /^C_(\d{1,2})_(\d{1,2})$/.exec(String(shiftId || ''));
      if (!match) return null;
      const start = Number(match[1]);
      const end = Number(match[2]);
      return { id: shiftId, name: `自訂 ${start}:00-${end}:00`, short: String(start), start, end, work: true, custom: true };
    }

        days.forEach(day => {

    function getAlerts(days = days28(), sum = summaries(days)) {

        if (!working.some(emp => roleMatches(emp, 'coach'))) messages.push(`${day.key} 沒有教練上班`);
        if (!working.some(emp => emp.role === 'frontdesk')) messages.push(`${day.key} 沒有櫃台人員上班`);
        if ((day.weekend || day.holiday) && working.length < 3) messages.push(`${day.key} 假日人力少於 3 人`);

      const next = cloneData(state.schedule);

    function escapeHtml(value) {

    }
    function dateRangeLabel(item) {

      const start = item.startDate || item.date;
      const end = item.endDate || item.date;
      return start === end ? shortDateLabel(start) : `${shortDateLabel(start)} ~ ${shortDateLabel(end)}`;
    }
    function shortDateLabel(dateKey) {

    function selectedDatesText() {

            <div class="request-form">
              <select id="requestEmployee">${employeeOptions}</select>
              <input type="month" value="${state.requestMonth}" data-action="requestMonth" />
              <button class="secondary" data-action="currentRequestMonth">回本月</button>
              <select id="requestShift">${shiftOptions}</select>
              <button class="primary" data-action="addRequest">送到表單</button>
              <div class="request-calendar">${calendarCells}</div>
              <div class="request-selected" id="requestSelectedSummary">${selectedDatesText()}</div>
              <textarea id="requestNote" placeholder="備註，例如：只方便早班、可配合調整"></textarea>
            </div>
            <div class="notice" style="margin:12px">送出後會自動回到班表頁，資料會送到 Google 表單集中收集。</div>
          ` : `<div class="notice" style="margin:12px">下面是這台電腦暫存的希望班紀錄。主管正式查看請用「回覆試算表」。${GOOGLE_SHEET_RESPONSES_URL ? `<a href="${GOOGLE_SHEET_RESPONSES_URL}" target="_blank" rel="noopener">回覆試算表</a>　` : '尚未放入試算表連結，請把 Google 試算表網址貼給我。　'}<a href="${GOOGLE_FORM_VIEW_URL}" target="_blank" rel="noopener">填寫頁</a></div>`}
          ${state.view === 'admin' && rows ? `<div class="table-wrap">${rows}</div>` : ''}
        </section>`);
    }
    function showToast(message) {
      const old = document.getElementById('toast');
      if (old) old.remove();
      const toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = 'toast';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2600);
    }
    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.style.display = 'none';
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        URL.revokeObjectURL(url);
        a.remove();
      }, 1000);
    }
    function exportData() {
      const payload = {
        app: 'fitness-schedule-html',
        version: 1,
        exportedAt: new Date().toISOString(),
        employees: state.employees,
        schedule: state.schedule,
        requests: state.requests
      };
      downloadFile(`fitness-schedule-data-${formatDate(new Date())}.json`, JSON.stringify(payload, null, 2), 'application/json;charset=utf-8');
      showToast('資料已匯出，可以到線上版匯入');
    }
    function importDataFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(String(reader.result || '{}'));
          if (!Array.isArray(payload.employees) || typeof payload.schedule !== 'object' || payload.schedule === null) {
            showToast('匯入失敗：檔案格式不正確');
            return;
          }
          state.employees = payload.employees;
          state.schedule = payload.schedule || {};
          state.requests = Array.isArray(payload.requests) ? payload.requests : [];
          state.undo = [];
          normalizeEmployeeOrder();
          save();
          showToast('資料已匯入');
          render();
        } catch {
          showToast('匯入失敗：檔案無法讀取');
        }
      };
      reader.readAsText(file, 'utf-8');
    }
    function exportHtml() {
      const days = days28();
      const employees = sortEmployees(state.employees.filter(employeeVisible));
      const head = days.map(day => {
        const cls = day.holiday ? 'holiday-cell' : day.monday ? 'monday' : day.weekend ? 'weekend' : '';
        return `<th class="${cls}"><div>${day.key.slice(5).replace('-', '/')}</div><div>${day.dow}</div>${day.monday && !day.holiday ? '<small class="meeting">開會</small>' : ''}${day.holiday ? `<small class="holiday">${escapeHtml(day.holiday)}</small>` : ''}</th>`;
      }).join('');
      const rows = employees.map(emp => {
        const cells = days.map(day => {
          const id = state.schedule[day.key]?.[emp.id];
          const cls = day.holiday ? 'holiday-cell' : day.monday ? 'monday' : day.weekend ? 'weekend' : '';
          return `<td class="${cls}">${id ? `<span class="shift ${shiftClass(id)}">${escapeHtml(shiftCellLabel(id))}</span>` : ''}</td>`;
        }).join('');
        return `<tr><td class="name"><b>${escapeHtml(emp.name)}</b><br><small>${roleLabel(emp.role)}</small></td>${cells}<td class="signature"></td></tr>`;
      }).join('');
      const html = `<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>FITNESS SCHEDULE ${days[0].key}</title>
  <style>
    @page { size: landscape; margin: 10mm; }
    body { margin: 0; color: #0f172a; font-family: "Microsoft JhengHei", system-ui, sans-serif; }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .range { margin-bottom: 12px; color: #475569; font-weight: 700; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid #64748b; }
    th, td { border: 1px solid #64748b; padding: 5px 3px; text-align: center; font-size: 11px; }
    th { background: #f8fafc; }
    .name { width: 120px; text-align: left; background: #fff; }
    .signature { width: 90px; border-bottom: 1px dashed #64748b; }
    .monday { background: #f3e8ff; }
    .weekend { background: #fef3c7; }
    .holiday-cell { background: #fee2e2; }
    .meeting, .holiday { display: block; margin-top: 2px; border-radius: 4px; color: white; padding: 1px 2px; font-size: 8px; }
    .meeting { background: #a855f7; }
    .holiday { background: #ef4444; }
    .shift { display: inline-block; min-width: 24px; border-radius: 6px; border: 1px solid; padding: 3px 4px; font-weight: 900; }
    .M, .A, .N, .P, .CUSTOM { background: transparent; color: #111827; border-color: transparent; }
    .O { background: #e2e8f0; color: #dc2626; border-color: #cbd5e1; }
    .AL { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
    .CUSTOM { background: transparent; color: #111827; border-color: transparent; }
  </style>
</head>
<body>
  <h1>FITNESS SCHEDULE</h1>
  <div class="range">${days[0].key} 到 ${days[27].key}</div>
  <table>
    <thead><tr><th class="name">員工</th>${head}<th class="signature">簽名</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</body>
</html>`;
      const filename = `fitness-schedule-${days[0].key}.html`;
      downloadFile(filename, html, 'text/html;charset=utf-8');
      showToast(`HTML 已下載：${filename}`);
    }
    function printSchedule() {
      showToast('正在開啟列印視窗。若沒有跳出，請按 Ctrl + P。');
      setTimeout(() => window.print(), 80);
    }
    function render() {
      if (state.view === 'login') return renderLogin();
      if (state.tab === 'daily') renderDaily();
      else if (state.tab === 'employees') renderEmployees();
      else if (state.tab === 'requests') renderRequests();
      else renderWeekly();
    }
    document.addEventListener('click', event => {
      if (event.target.id === 'picker') {
        state.selected = null;
        render();
        return;
      }
      const target = event.target.closest('[data-action],[data-tab],[data-quick],[data-date],[data-pick],[data-delete],[data-edit],[data-move],[data-person-filter],[data-request-delete],[data-request-date]');
      if (!target) {
        if (state.selected && event.target.closest('#picker .picker-card')) return;
        if (state.selected) { state.selected = null; render(); }
        return;
      }
      if (target.dataset.tab) { state.tab = target.dataset.tab; render(); return; }
      if (target.dataset.personFilter) {
        const id = target.dataset.personFilter;
        const current = Array.isArray(state.personFilter) ? state.personFilter : [];
        state.personFilter = id === 'all'
          ? []
          : (current.includes(id) ? current.filter(item => item !== id) : [...current, id]);
        render();
        return;
      }
      if (target.dataset.requestDate) {
        const date = target.dataset.requestDate;
        state.requestSelectedDates = state.requestSelectedDates.includes(date)
          ? state.requestSelectedDates.filter(item => item !== date)
          : [...state.requestSelectedDates, date].sort();
        updateRequestSelectionDisplay();
        return;
      }
      if (target.dataset.quick) { state.quick = state.quick === target.dataset.quick ? null : target.dataset.quick; render(); return; }
      if (target.dataset.date && state.view === 'admin') {
        const date = target.dataset.date, emp = target.dataset.emp;
        if (state.quick === 'CLEAR') setShift(date, emp, null);
        else if (state.quick) setShift(date, emp, state.quick);
        else { state.selected = { date, emp }; render(); }
        return;
      }
      if ('pick' in target.dataset && state.selected) {
        const selected = state.selected;
        state.selected = null;
        setShift(selected.date, selected.emp, target.dataset.pick || null);
        return;
      }
      if (target.dataset.delete) {
        const id = target.dataset.delete;
        state.employees = state.employees.filter(emp => emp.id !== id);
        const next = cloneData(state.schedule);
        Object.keys(next).forEach(date => { delete next[date][id]; if (!Object.keys(next[date]).length) delete next[date]; });
        state.schedule = next;
        normalizeEmployeeOrder();
        save();
        render();
        return;
      }
      if (target.dataset.requestDelete) {
        state.requests = state.requests.filter(item => item.id !== target.dataset.requestDelete);
        save();
        render();
        return;
      }
      const action = target.dataset.action;
      if (action === 'logout') { state.view = 'login'; state.tab = 'weekly'; state.quick = null; state.editingEmployee = null; render(); }
      if (action === 'closePicker') { state.selected = null; render(); return; }
      if (action === 'saveCustomShift' && state.selected) {
        const start = Number(document.getElementById('customStart')?.value);
        const end = Number(document.getElementById('customEnd')?.value);
        if (!Number.isFinite(start) || !Number.isFinite(end) || start < 0 || end > 24 || end <= start) {
          showToast('請輸入正確時間，例如 10 到 18');
          return;
        }
        const selected = state.selected;
        state.selected = null;
        setShift(selected.date, selected.emp, customShiftId(start, end));
        return;
      }
      if (action === 'prev4') { state.baseDate.setDate(state.baseDate.getDate() - (isMobileView() ? 7 : 28)); render(); }
      if (action === 'next4') { state.baseDate.setDate(state.baseDate.getDate() + (isMobileView() ? 7 : 28)); render(); }
      if (action === 'todayRange') { state.baseDate = new Date(); render(); }
      if (action === 'prevDay') { state.timelineDate.setDate(state.timelineDate.getDate() - 1); render(); }
      if (action === 'nextDay') { state.timelineDate.setDate(state.timelineDate.getDate() + 1); render(); }
      if (action === 'print') { printSchedule(); return; }
      if (action === 'html') { exportHtml(); return; }
      if (action === 'exportData') { exportData(); return; }
      if (action === 'importData') { document.getElementById('importDataFile')?.click(); return; }
      if (action === 'toggleControls') { state.controlsOpen = !state.controlsOpen; render(); return; }
      if (action === 'toggleAlerts') { state.alertsOpen = !state.alertsOpen; render(); return; }
      if (action === 'undo' && state.undo.length) { state.schedule = state.undo.shift(); save(); render(); }
      if (action === 'copyWeek') {
        const days = visibleScheduleDays();
        const next = cloneData(state.schedule);
        days.slice(0, 7).forEach(day => {
          const source = new Date(day.date);
          source.setDate(source.getDate() - 7);
          next[day.key] = cloneData(state.schedule[formatDate(source)] || {});
        });
        pushSchedule(next);
        render();
      }
      if (action === 'fillOff') {
        const days = visibleScheduleDays();
        const employees = sortEmployees(state.employees.filter(employeeVisible));
        const next = cloneData(state.schedule);
        days.forEach(day => {
          next[day.key] ||= {};
          employees.forEach(emp => {
            if (!next[day.key][emp.id]) next[day.key][emp.id] = 'O';
          });
        });
        pushSchedule(next);
        render();
      }
      if (action === 'addEmployee') {
        const name = document.getElementById('newName').value.trim();
        const role = document.getElementById('newRole').value;
        if (!name) return;
        state.employees.push({ id: 'emp_' + Date.now(), name, role, type: role === 'parttime' ? 'parttime' : 'fulltime', position: state.employees.length });
        normalizeEmployeeOrder();
        save();
        render();
      }
      if (action === 'moveEmployee') {
        const ordered = sortEmployees(state.employees);
        const index = ordered.findIndex(emp => emp.id === target.dataset.edit);
        const nextIndex = index + (target.dataset.move === 'up' ? -1 : 1);
        if (index < 0 || nextIndex < 0 || nextIndex >= ordered.length) return;
        const moved = [...ordered];
        [moved[index], moved[nextIndex]] = [moved[nextIndex], moved[index]];
        const positions = new Map(moved.map((emp, idx) => [emp.id, idx]));
        state.employees = state.employees.map(emp => ({ ...emp, position: positions.get(emp.id) ?? emp.position ?? 9999 }));
        normalizeEmployeeOrder();
        save();
        render();
      }
      if (action === 'editEmployee') {
        state.editingEmployee = target.dataset.edit;
        render();
      }
      if (action === 'cancelEmployeeEdit') {
        state.editingEmployee = null;
        render();
      }
      if (action === 'saveEmployee') {
        const id = target.dataset.edit;
        const name = document.getElementById('editName').value.trim();
        const role = document.getElementById('editRole').value;
        if (!name) return;
        state.employees = state.employees.map(emp => emp.id === id ? { ...emp, name, role, type: role === 'parttime' ? 'parttime' : 'fulltime' } : emp);
        state.editingEmployee = null;
        save();
        render();
      }
      if (action === 'clearRequestDates') {
        state.requestSelectedDates = [];
        updateRequestSelectionDisplay();
      }
      if (action === 'currentRequestMonth') {
        state.requestMonth = formatMonth(new Date());
        state.requestSelectedDates = [];
        render();
      }
      if (action === 'addRequest') {
        const employeeId = document.getElementById('requestEmployee').value;
        const employee = state.employees.find(emp => emp.id === employeeId);
        const name = employee?.name || '';
        const shift = document.getElementById('requestShift').value;
        const note = document.getElementById('requestNote').value.trim();
        const dates = [...state.requestSelectedDates].sort();
        if (!name || !dates.length) return;
        state.requests.push({ id: 'req_' + Date.now(), name, date: dates[0], dates, shift, note, createdAt: formatDate(new Date()) });
        submitGoogleForm(buildGoogleFormDetails(name, dates, shift, note));
        state.requestSelectedDates = [];
        save();
        state.tab = 'weekly';
        render();
      }
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && state.selected) {
        state.selected = null;
        render();
      }
    });
    document.addEventListener('change', event => {
      if (event.target.dataset.action === 'filter') {
        state.filter = event.target.value;
        state.personFilter = [];
        render();
      }
      if (event.target.dataset.action === 'requestMonth') {
        state.requestMonth = event.target.value || formatMonth(new Date());
        state.requestSelectedDates = [];
        render();
      }
      if (event.target.dataset.action === 'importDataFile') {
        importDataFile(event.target.files?.[0]);
        event.target.value = '';
      }
    });
    window.addEventListener('resize', () => {
      clearTimeout(window.__scheduleResizeTimer);
      window.__scheduleResizeTimer = setTimeout(() => {
        if (state.view !== 'login') render();
      }, 160);
    });
    load();
    render();
  </script>
</body>
</html>
