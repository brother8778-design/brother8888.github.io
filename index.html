<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FITNESS SCHEDULE - 健身房排班系統</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --panel: rgba(255,255,255,.92);
      --line: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #4f46e5;
      --danger: #dc2626;
      --warn-bg: #fffbeb;
      --warn: #92400e;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif; }
    button, input, select { font: inherit; }
    button { cursor: pointer; border: 0; }
    .app { min-height: 100vh; padding: 12px; }
    .login { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .login-card { width: min(390px, 100%); background: var(--panel); border: 1px solid white; border-radius: 24px; padding: 32px; box-shadow: 0 22px 55px rgba(15,23,42,.16); }
    h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: .02em; }
    .subtitle { margin: 4px 0 26px; color: var(--muted); font-size: 13px; font-weight: 800; }
    .login-card input { width: 100%; border: 1px solid var(--line); border-radius: 14px; background: #f8fafc; padding: 14px; text-align: center; font-size: 18px; font-weight: 800; letter-spacing: .2em; outline: none; }
    .login-card input:focus { background: white; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(79,70,229,.16); }
    .primary { background: var(--brand); color: white; border-radius: 12px; padding: 10px 14px; font-weight: 900; box-shadow: 0 8px 18px rgba(79,70,229,.18); }
    .secondary { background: white; color: #334155; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-weight: 800; }
    .danger { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; border-radius: 10px; padding: 8px 10px; font-weight: 800; }
    .hint { margin-top: 18px; border: 1px solid #eef2f7; border-radius: 14px; background: #f8fafc; padding: 12px; color: var(--muted); text-align: center; font-size: 12px; font-weight: 800; line-height: 1.8; }
    .error { min-height: 20px; margin: 8px 0 12px; color: var(--danger); text-align: center; font-size: 12px; font-weight: 900; }
    .shell { height: calc(100vh - 24px); display: flex; flex-direction: column; gap: 12px; }
    header, nav, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 4px 16px rgba(15,23,42,.05); }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 18px; }
    .mode { border: 1px solid var(--line); border-radius: 10px; background: #f8fafc; padding: 7px 10px; color: #475569; font-size: 12px; font-weight: 900; }
    .header-actions, .toolbar, .tabs, .quickbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    nav { display: flex; justify-content: space-between; gap: 10px; padding: 8px; }
    .tabs { background: #e2e8f0; border-radius: 14px; padding: 4px; }
    .tab { border-radius: 10px; padding: 8px 13px; color: #64748b; font-size: 13px; font-weight: 900; background: transparent; }
    .tab.active { background: white; color: #0f172a; box-shadow: 0 2px 8px rgba(15,23,42,.08); }
    .notice { border: 1px solid #c7d2fe; background: #eef2ff; color: #3730a3; border-radius: 14px; padding: 10px 14px; font-size: 13px; font-weight: 850; }
    main { flex: 1; min-height: 0; }
    .panel { height: 100%; overflow: hidden; display: flex; flex-direction: column; }
    .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid #eef2f7; background: #f8fafc; }
    .range-title { min-width: 230px; text-align: center; font-size: 14px; font-weight: 950; }
    .quickbar { border-bottom: 1px solid #c7d2fe; background: #eef2ff; padding: 8px 12px; overflow-x: auto; }
    .quickbar span { color: #3730a3; font-size: 12px; font-weight: 950; white-space: nowrap; }
    .chip { border: 1px solid var(--line); border-radius: 10px; background: white; color: #475569; padding: 7px 10px; font-size: 12px; font-weight: 900; white-space: nowrap; }
    .chip.active { outline: 2px solid var(--brand); outline-offset: 1px; }
    .alerts { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; border-bottom: 1px solid #fde68a; background: var(--warn-bg); padding: 10px 14px; color: var(--warn); font-size: 12px; font-weight: 900; }
    .table-wrap { flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border-right: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    th { position: sticky; top: 0; z-index: 2; background: #f8fafc; padding: 6px 4px; font-size: 11px; }
    .name-col { position: sticky; left: 0; z-index: 3; width: 132px; background: white; text-align: left; padding: 8px; }
    thead .name-col { background: #f8fafc; z-index: 4; }
    .date-col { width: 46px; text-align: center; }
    .signature-col { width: 96px; text-align: center; }
    tbody td { height: 40px; background: white; padding: 3px; }
    tbody tr:hover td, tbody tr:hover .name-col { background: #f8fafc; }
    .employee-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 950; }
    .role { color: #94a3b8; font-size: 10px; font-weight: 850; }
    .date { color: #64748b; font-size: 10px; font-weight: 950; }
    .dow { font-size: 12px; font-weight: 950; }
    .holiday { margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-radius: 4px; background: #ef4444; color: white; padding: 1px 2px; font-size: 8px; font-weight: 900; }
    .monday { background: #f3e8ff !important; }
    .weekend { background: #fef3c7 !important; }
    .holiday-cell { background: #fee2e2 !important; }
    .signature-line { height: 18px; border-bottom: 1px dashed #64748b; }
    .cell { cursor: pointer; }
    .shift { width: 100%; height: 100%; display: grid; place-items: center; border-radius: 7px; border: 1px solid; font-size: 12px; font-weight: 950; }
    .M { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .A { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
    .N { background: #e0e7ff; color: #3730a3; border-color: #a5b4fc; }
    .P { background: #e0f2fe; color: #0369a1; border-color: #7dd3fc; }
    .O { background: #e2e8f0; color: #475569; border-color: #cbd5e1; border-style: dashed; }
    .AL { background: #fae8ff; color: #a21caf; border-color: #f0abfc; border-style: dashed; }
    .picker { position: fixed; inset: 0; display: none; place-items: center; background: rgba(15,23,42,.16); z-index: 10; padding: 20px; }
    .picker.open { display: grid; }
    .picker-card { background: white; border: 1px solid var(--line); border-radius: 16px; padding: 14px; box-shadow: 0 20px 40px rgba(15,23,42,.18); }
    .picker-title { padding-bottom: 10px; border-bottom: 1px solid var(--line); margin-bottom: 10px; text-align: center; color: #64748b; font-size: 12px; font-weight: 950; }
    .picker-grid { display: grid; grid-template-columns: repeat(3, 92px); gap: 8px; }
    .employee-form { display: grid; grid-template-columns: 1fr 190px auto; gap: 10px; padding: 14px; border-bottom: 1px solid var(--line); background: #f8fafc; }
    .employee-form input, .employee-form select, .toolbar select { border: 1px solid var(--line); border-radius: 10px; background: white; padding: 9px 11px; font-weight: 850; outline: none; }
    .employee-table th, .employee-table td { padding: 10px 12px; text-align: left; height: auto; }
    .timeline { min-width: 900px; padding: 14px; }
    .timeline-grid { display: grid; grid-template-columns: 120px repeat(17, 48px); border-bottom: 1px solid var(--line); }
    .timeline-grid > div { padding: 8px 4px; font-size: 12px; font-weight: 850; border-right: 1px solid #eef2f7; }
    .bar-row { display: grid; grid-template-columns: 120px 816px; border-bottom: 1px solid #eef2f7; }
    .bar-name { padding: 13px 8px; font-size: 13px; font-weight: 950; background: white; }
    .bar-space { position: relative; height: 48px; }
    .bar { position: absolute; top: 8px; height: 32px; display: grid; place-items: center; border-radius: 9px; border: 1px solid; font-size: 12px; font-weight: 950; }
    .empty { padding: 48px; text-align: center; color: #94a3b8; font-weight: 900; }
    @media (max-width: 760px) {
      header, nav, .panel-head { align-items: stretch; flex-direction: column; }
      .alerts { grid-template-columns: 1fr; }
      .employee-form { grid-template-columns: 1fr; }
    }
    @media print {
      @page { size: landscape; margin: 10mm; }
      body { background: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .app { padding: 0; }
      header, nav, .quickbar, .toolbar, .notice, .alerts, .picker { display: none !important; }
      .shell, .panel { height: auto; box-shadow: none; border: 0; }
      .table-wrap { overflow: visible; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const STORAGE_KEY = 'fitness-schedule-html-v1';
    const recurringHolidays = {
      '01-01': '元旦',
      '02-28': '228和平紀念日',
      '04-04': '兒童節',
      '04-05': '清明節',
      '05-01': '勞動節',
      '10-10': '國慶日'
    };
    const variableHolidays = {
      '2026-02-16': '春節除夕',
      '2026-02-17': '春節初一',
      '2026-02-18': '春節初二',
      '2026-02-19': '春節初三',
      '2026-02-20': '春節初四',
      '2026-02-21': '春節初五',
      '2026-04-03': '清明/兒童連假',
      '2026-04-06': '清明補假',
      '2026-06-19': '端午節',
      '2026-09-25': '中秋節',
      '2027-02-05': '春節除夕',
      '2027-02-06': '春節初一'
    };
    const shifts = {
      M: { id: 'M', name: '早班', short: '早', start: 7, end: 16, work: true },
      A: { id: 'A', name: '中班', short: '中', start: 12, end: 21, work: true },
      N: { id: 'N', name: '晚班', short: '晚', start: 14, end: 23, work: true },
      P: { id: 'P', name: '工讀', short: '工', start: 16, end: 23, work: true },
      O: { id: 'O', name: '排休', short: '休', start: 7, end: 23, work: false },
      AL: { id: 'AL', name: '特休', short: '特', start: 7, end: 23, work: false }
    };
    const defaults = [
      { id: 'c1', name: '教練 A', role: 'coach', type: 'fulltime' },
      { id: 'c2', name: '教練 B', role: 'coach', type: 'fulltime' },
      { id: 'c3', name: '教練 C', role: 'coach', type: 'fulltime' },
      { id: 'c4', name: '教練 D', role: 'coach', type: 'fulltime' },
      { id: 'c5', name: '教練 E', role: 'coach', type: 'fulltime' },
      { id: 'c6', name: '教練 F', role: 'coach', type: 'fulltime' },
      { id: 'f1', name: '櫃台正職', role: 'frontdesk', type: 'fulltime' },
      { id: 'p1', name: '工讀生 甲', role: 'parttime', type: 'parttime' },
      { id: 'p2', name: '工讀生 乙', role: 'parttime', type: 'parttime' },
      { id: 'p3', name: '工讀生 丙', role: 'parttime', type: 'parttime' },
      { id: 'p4', name: '工讀生 丁', role: 'parttime', type: 'parttime' }
    ];
    const state = {
      view: 'login',
      tab: 'weekly',
      baseDate: new Date(),
      timelineDate: new Date(),
      quick: null,
      employees: structuredClone(defaults),
      schedule: {},
      undo: [],
      filter: 'all',
      selected: null
    };

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        if (Array.isArray(saved.employees)) state.employees = saved.employees;
        if (saved.schedule) state.schedule = saved.schedule;
      } catch { localStorage.removeItem(STORAGE_KEY); }
    }
    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ employees: state.employees, schedule: state.schedule }));
    }
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    function holidayName(dateKey) {
      return variableHolidays[dateKey] || recurringHolidays[dateKey.slice(5)] || '';
    }
    function weekStart(date) {
      const d = new Date(date);
      const day = d.getDay();
      d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
      d.setHours(0,0,0,0);
      return d;
    }
    function days28() {
      const current = weekStart(state.baseDate);
      const today = formatDate(new Date());
      return Array.from({ length: 28 }, (_, i) => {
        const d = new Date(current);
        d.setDate(current.getDate() + i);
        const key = formatDate(d);
        return { date: d, key, dow: ['日','一','二','三','四','五','六'][d.getDay()], monday: d.getDay() === 1, weekend: d.getDay() === 0 || d.getDay() === 6, today: key === today, holiday: holidayName(key) };
      });
    }
    function roleLabel(role) {
      return role === 'coach' ? '教練' : role === 'frontdesk' ? '櫃台' : '工讀';
    }
    function hoursOf(shiftId) {
      const s = shifts[shiftId];
      return s && s.work ? s.end - s.start : 0;
    }
    function summaries(days = days28()) {
      return state.employees.map(emp => {
        let hours = 0, workDays = 0, restDays = 0;
        days.forEach(day => {
          const id = state.schedule[day.key]?.[emp.id];
          if (!id) return;
          hours += hoursOf(id);
          shifts[id].work ? workDays++ : restDays++;
        });
        return { empId: emp.id, hours, workDays, restDays };
      });
    }
    function getAlerts(days = days28(), sum = summaries(days)) {
      const messages = [];
      days.forEach(day => {
        const assigned = state.schedule[day.key] || {};
        const working = state.employees.filter(emp => assigned[emp.id] && shifts[assigned[emp.id]].work);
        if (!working.some(emp => emp.role === 'coach')) messages.push(`${day.key} 沒有教練上班`);
        if (!working.some(emp => emp.role === 'frontdesk')) messages.push(`${day.key} 沒有櫃台人員上班`);
        if ((day.weekend || day.holiday) && working.length < 3) messages.push(`${day.key} 假日人力少於 3 人`);
      });
      return messages.slice(0, 8);
    }
    function pushSchedule(next) {
      state.undo.unshift(structuredClone(state.schedule));
      state.undo = state.undo.slice(0, 20);
      state.schedule = next;
      save();
    }
    function setShift(date, empId, shiftId) {
      const next = structuredClone(state.schedule);
      next[date] ||= {};
      if (shiftId) next[date][empId] = shiftId;
      else delete next[date][empId];
      if (!Object.keys(next[date]).length) delete next[date];
      pushSchedule(next);
      render();
    }
    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[char]));
    }
    function layout(content) {
      document.getElementById('app').innerHTML = `
        <div class="app"><div class="shell">
          <header>
            <div><h1>FITNESS SCHEDULE</h1><div class="subtitle" style="margin:2px 0 0">健身房排班系統 Pro</div></div>
            <div class="header-actions">
              <span class="mode">模式：${state.view === 'admin' ? '管理者' : '員工檢視'}</span>
              <button class="secondary" data-action="logout">登出</button>
            </div>
          </header>
          <nav>
            <div class="tabs">
              <button class="tab ${state.tab === 'weekly' ? 'active' : ''}" data-tab="weekly">四週班表</button>
              <button class="tab ${state.tab === 'daily' ? 'active' : ''}" data-tab="daily">每日時間軸</button>
              ${state.view === 'admin' ? `<button class="tab ${state.tab === 'employees' ? 'active' : ''}" data-tab="employees">員工</button>` : ''}
            </div>
          </nav>
          ${state.view === 'employee' ? '<div class="notice">目前是員工檢視模式，只能查看班表，不能修改。</div>' : ''}
          <main>${content}</main>
        </div></div>`;
    }
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="login">
          <section class="login-card">
            <h1 style="text-align:center">FITNESS SCHEDULE</h1>
            <div class="subtitle" style="text-align:center">健身房排班系統 Pro</div>
            <form id="loginForm">
              <input id="password" type="password" placeholder="輸入密碼" autofocus />
              <div class="error" id="loginError"></div>
              <button class="primary" style="width:100%; padding:13px">登入</button>
            </form>
            <div class="hint"><div>管理者：A12345</div><div>員工檢視：B12345</div></div>
          </section>
        </div>`;
      document.getElementById('loginForm').addEventListener('submit', event => {
        event.preventDefault();
        const pw = document.getElementById('password').value;
        if (pw === 'A12345') state.view = 'admin';
        else if (pw === 'B12345') state.view = 'employee';
        else {
          document.getElementById('loginError').textContent = '密碼錯誤，請重新輸入';
          return;
        }
        render();
      });
    }
    function renderWeekly() {
      const days = days28();
      const sum = summaries(days);
      const alerts = getAlerts(days, sum);
      const employees = state.employees.filter(emp => state.filter === 'all' || emp.role === state.filter);
      const rows = employees.map(emp => {
        const cells = days.map(day => {
          const id = state.schedule[day.key]?.[emp.id];
          const dayClass = day.holiday ? 'holiday-cell' : day.monday ? 'monday' : day.weekend ? 'weekend' : '';
          return `<td class="cell ${dayClass}" data-date="${day.key}" data-emp="${emp.id}">${id ? `<div class="shift ${id}">${shifts[id].short}</div>` : ''}</td>`;
        }).join('');
        return `<tr><td class="name-col"><div class="employee-name">${escapeHtml(emp.name)}</div><div class="role">${roleLabel(emp.role)}</div></td>${cells}<td class="signature-col"><div class="signature-line"></div></td></tr>`;
      }).join('');
      const head = days.map(day => {
        const dayClass = day.holiday ? 'holiday-cell' : day.monday ? 'monday' : day.weekend ? 'weekend' : '';
        return `<th class="date-col ${dayClass}"><div class="date">${day.key.slice(5).replace('-', '/')}</div><div class="dow">${day.dow}</div>${day.monday && !day.holiday ? '<div class="holiday" style="background:#a855f7">開會</div>' : ''}${day.holiday ? `<div class="holiday" title="${day.holiday}">${day.holiday}</div>` : ''}</th>`;
      }).join('');
      layout(`
        <section class="panel">
          <div class="panel-head">
            <div class="toolbar">
              <button class="secondary" data-action="prev4">前四週</button>
              <div class="range-title">${days[0].key} 到 ${days[27].key}</div>
              <button class="secondary" data-action="next4">後四週</button>
            </div>
            <div class="toolbar">
              <select data-action="filter"><option value="all">全部員工</option><option value="coach">教練</option><option value="frontdesk">櫃台</option><option value="parttime">工讀</option></select>
              ${state.view === 'admin' ? '<button class="secondary" data-action="copyWeek">複製上週</button><button class="secondary" data-action="undo">復原</button>' : ''}
              <button class="primary" data-action="csv">CSV</button>
              <button class="primary" data-action="print">列印</button>
            </div>
          </div>
          ${state.view === 'admin' ? `<div class="quickbar"><span>快速排班</span>${Object.values(shifts).map(s => `<button class="chip ${state.quick === s.id ? 'active' : ''}" data-quick="${s.id}">${s.name}</button>`).join('')}<button class="chip ${state.quick === 'CLEAR' ? 'active' : ''}" data-quick="CLEAR">清除</button></div>` : ''}
          ${alerts.length ? `<div class="alerts">${alerts.map(a => `<div>提醒：${a}</div>`).join('')}</div>` : ''}
          <div class="table-wrap"><table><thead><tr><th class="name-col">員工</th>${head}<th class="signature-col">簽名</th></tr></thead><tbody>${rows}</tbody></table></div>
        </section>
        <div class="picker ${state.selected ? 'open' : ''}" id="picker"><div class="picker-card">
          <div class="picker-title">${state.selected ? `${state.selected.date} - ${escapeHtml(state.employees.find(e => e.id === state.selected.emp)?.name || '')}` : ''}</div>
          <div class="picker-grid">${Object.values(shifts).map(s => `<button class="shift ${s.id}" data-pick="${s.id}">${s.name}</button>`).join('')}</div>
          <button class="danger" style="width:100%; margin-top:10px" data-pick="">清除班別</button>
        </div></div>`);
      document.querySelector('[data-action="filter"]').value = state.filter;
    }
    function renderDaily() {
      const key = formatDate(state.timelineDate);
      const holiday = holidayName(key);
      const assigned = state.schedule[key] || {};
      const working = state.employees.filter(emp => assigned[emp.id] && shifts[assigned[emp.id]].work);
      const hours = Array.from({ length: 17 }, (_, i) => i + 7);
      const rows = working.map(emp => {
        const s = shifts[assigned[emp.id]];
        return `<div class="bar-row"><div class="bar-name">${escapeHtml(emp.name)}</div><div class="bar-space"><div class="bar ${s.id}" style="left:${(s.start - 7) * 48}px;width:${(s.end - s.start) * 48}px">${s.name} ${s.start}:00-${s.end}:00</div></div></div>`;
      }).join('');
      layout(`
        <section class="panel">
          <div class="panel-head">
            <button class="secondary" data-action="prevDay">前一天</button>
            <div class="range-title">${key}${holiday ? `<div style="color:#dc2626;font-size:12px">${holiday}</div>` : ''}</div>
            <button class="secondary" data-action="nextDay">後一天</button>
          </div>
          <div class="table-wrap"><div class="timeline">
            <div class="timeline-grid"><div>員工</div>${hours.map(h => `<div>${h}:00</div>`).join('')}</div>
            ${rows || '<div class="empty">這天尚未安排上班人員</div>'}
          </div></div>
        </section>`);
    }
    function renderEmployees() {
      const rows = state.employees.map(emp => {
        return `<tr><td><b>${escapeHtml(emp.name)}</b></td><td>${roleLabel(emp.role)}</td><td style="text-align:right"><button class="danger" data-delete="${emp.id}">刪除</button></td></tr>`;
      }).join('');
      layout(`
        <section class="panel">
          <div class="employee-form">
            <input id="newName" placeholder="輸入員工姓名" />
            <select id="newRole"><option value="coach">教練</option><option value="frontdesk">櫃台</option><option value="parttime">工讀</option></select>
            <button class="primary" data-action="addEmployee">新增</button>
          </div>
          <div class="table-wrap"><table class="employee-table"><thead><tr><th>員工</th><th>職務</th><th style="text-align:right">操作</th></tr></thead><tbody>${rows}</tbody></table></div>
        </section>`);
    }
    function exportCsv() {
      const days = days28();
      const header = ['員工', '職務', ...days.map(d => `${d.key}(${d.dow})`), '簽名'];
      const rows = state.employees.map(emp => {
        return [emp.name, roleLabel(emp.role), ...days.map(d => shifts[state.schedule[d.key]?.[emp.id]]?.name || ''), ''];
      });
      const csv = [header, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fitness-schedule-${days[0].key}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
    function render() {
      if (state.view === 'login') return renderLogin();
      if (state.tab === 'daily') renderDaily();
      else if (state.tab === 'employees') renderEmployees();
      else renderWeekly();
    }
    document.addEventListener('click', event => {
      const target = event.target.closest('[data-action],[data-tab],[data-quick],[data-date],[data-pick],[data-delete]');
      if (!target) {
        if (state.selected) { state.selected = null; render(); }
        return;
      }
      if (target.dataset.tab) { state.tab = target.dataset.tab; render(); return; }
      if (target.dataset.quick) { state.quick = state.quick === target.dataset.quick ? null : target.dataset.quick; render(); return; }
      if (target.dataset.date && state.view === 'admin') {
        const date = target.dataset.date, emp = target.dataset.emp;
        if (state.quick === 'CLEAR') setShift(date, emp, null);
        else if (state.quick) setShift(date, emp, state.quick);
        else { state.selected = { date, emp }; render(); }
        return;
      }
      if ('pick' in target.dataset && state.selected) {
        setShift(state.selected.date, state.selected.emp, target.dataset.pick || null);
        state.selected = null;
        return;
      }
      if (target.dataset.delete) {
        const id = target.dataset.delete;
        state.employees = state.employees.filter(emp => emp.id !== id);
        const next = structuredClone(state.schedule);
        Object.keys(next).forEach(date => { delete next[date][id]; if (!Object.keys(next[date]).length) delete next[date]; });
        state.schedule = next;
        save();
        render();
        return;
      }
      const action = target.dataset.action;
      if (action === 'logout') { state.view = 'login'; state.tab = 'weekly'; state.quick = null; render(); }
      if (action === 'prev4') { state.baseDate.setDate(state.baseDate.getDate() - 28); render(); }
      if (action === 'next4') { state.baseDate.setDate(state.baseDate.getDate() + 28); render(); }
      if (action === 'prevDay') { state.timelineDate.setDate(state.timelineDate.getDate() - 1); render(); }
      if (action === 'nextDay') { state.timelineDate.setDate(state.timelineDate.getDate() + 1); render(); }
      if (action === 'print') window.print();
      if (action === 'csv') exportCsv();
      if (action === 'undo' && state.undo.length) { state.schedule = state.undo.shift(); save(); render(); }
      if (action === 'copyWeek') {
        const days = days28();
        const next = structuredClone(state.schedule);
        days.slice(0, 7).forEach(day => {
          const source = new Date(day.date);
          source.setDate(source.getDate() - 7);
          next[day.key] = structuredClone(state.schedule[formatDate(source)] || {});
        });
        pushSchedule(next);
        render();
      }
      if (action === 'addEmployee') {
        const name = document.getElementById('newName').value.trim();
        const role = document.getElementById('newRole').value;
        if (!name) return;
        state.employees.push({ id: 'emp_' + Date.now(), name, role, type: role === 'parttime' ? 'parttime' : 'fulltime' });
        save();
        render();
      }
    });
    document.addEventListener('change', event => {
      if (event.target.dataset.action === 'filter') {
        state.filter = event.target.value;
        render();
      }
    });
    load();
    render();
  </script>
</body>
</html>
